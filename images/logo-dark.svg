<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48">
  <!-- BAM Engine Logo (dark mode) — outlined/schematic style -->
  <!-- Node fill matches PyData theme dark background -->

  <!-- Edges -->
  <g stroke="#64748B" stroke-width="1.5" stroke-linecap="round">
    <line x1="24" y1="24" x2="24" y2="6"/>
    <line x1="24" y1="24" x2="24" y2="42"/>
    <line x1="24" y1="6" x2="8.4" y2="15"/>
    <line x1="24" y1="6" x2="39.6" y2="15"/>
    <line x1="24" y1="42" x2="8.4" y2="33"/>
    <line x1="24" y1="42" x2="39.6" y2="33"/>
  </g>

  <!-- Household nodes (bright cyan outline) -->
  <circle cx="39.6" cy="15" r="3" fill="#14181e" stroke="#22D3EE" stroke-width="2"/>
  <circle cx="39.6" cy="33" r="3" fill="#14181e" stroke="#22D3EE" stroke-width="2"/>
  <circle cx="8.4" cy="33" r="3" fill="#14181e" stroke="#22D3EE" stroke-width="2"/>
  <circle cx="8.4" cy="15" r="3" fill="#14181e" stroke="#22D3EE" stroke-width="2"/>

  <!-- Firm nodes (light blue outline) -->
  <circle cx="24" cy="6" r="4" fill="#14181e" stroke="#60A5FA" stroke-width="2"/>
  <circle cx="24" cy="42" r="4" fill="#14181e" stroke="#60A5FA" stroke-width="2"/>

  <!-- Bank node (bright amber outline) -->
  <circle cx="24" cy="24" r="5.5" fill="#14181e" stroke="#FBBF24" stroke-width="2.5"/>

  <!-- Wordmark -->
  <text x="56" y="24" dominant-baseline="central"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="22" letter-spacing="-0.3">
    <tspan font-weight="700" fill="#60A5FA">BAM</tspan><tspan dx="4" font-weight="400" fill="#CBD5E1">Engine</tspan>
  </text>
</svg>
