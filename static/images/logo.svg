<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48">
  <!-- BAM Engine Logo (light mode) — outlined/schematic style -->
  <!-- Topology: Banks <-> Firms <-> Households -->

  <!-- Edges -->
  <g stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round">
    <!-- Bank to Firms (credit market) -->
    <line x1="24" y1="24" x2="24" y2="6"/>
    <line x1="24" y1="24" x2="24" y2="42"/>
    <!-- Firm 1 to Households (labor/goods markets) -->
    <line x1="24" y1="6" x2="8.4" y2="15"/>
    <line x1="24" y1="6" x2="39.6" y2="15"/>
    <!-- Firm 2 to Households (labor/goods markets) -->
    <line x1="24" y1="42" x2="8.4" y2="33"/>
    <line x1="24" y1="42" x2="39.6" y2="33"/>
  </g>

  <!-- Household nodes (teal outline) -->
  <circle cx="39.6" cy="15" r="3" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="39.6" cy="33" r="3" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="8.4" cy="33" r="3" fill="white" stroke="#0891B2" stroke-width="2"/>
  <circle cx="8.4" cy="15" r="3" fill="white" stroke="#0891B2" stroke-width="2"/>

  <!-- Firm nodes (blue outline) -->
  <circle cx="24" cy="6" r="4" fill="white" stroke="#2563EB" stroke-width="2"/>
  <circle cx="24" cy="42" r="4" fill="white" stroke="#2563EB" stroke-width="2"/>

  <!-- Bank node (amber outline) -->
  <circle cx="24" cy="24" r="5.5" fill="white" stroke="#D97706" stroke-width="2.5"/>

  <!-- Wordmark -->
  <text x="56" y="24" dominant-baseline="central"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="22" letter-spacing="-0.3">
    <tspan font-weight="700" fill="#1E40AF">BAM</tspan><tspan dx="4" font-weight="400" fill="#475569">Engine</tspan>
  </text>
</svg>
